<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Session Intelligence — Playbooks</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        :root { --pico-font-size: 15px; }
        nav { margin-bottom: 0; }

        .page-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            height: calc(100vh - 80px);
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        @media (max-width: 900px) {
            .page-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        /* ── Left panel: playbook list ── */
        .playbook-panel {
            overflow-y: auto;
            padding: 1rem 0;
        }
        .playbook-panel h3 { margin-bottom: 0.75rem; }

        .playbook-card {
            background: var(--pico-card-background-color);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 3px solid #2196f3;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .playbook-card:hover { border-left-color: #43a047; }
        .playbook-card.expanded { border-left-color: #43a047; }

        .playbook-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .playbook-card .card-title { font-weight: bold; font-size: 1rem; margin-bottom: 0.25rem; }
        .playbook-card .card-desc { font-size: 0.85rem; opacity: 0.8; margin-bottom: 0.5rem; }
        .playbook-card .card-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .section-badge {
            display: inline-block; font-size: 0.75rem; padding: 2px 8px;
            border-radius: 4px; background: #2196f3; color: white;
        }
        .keyword-chip {
            display: inline-block; font-size: 0.7rem; padding: 2px 6px;
            border-radius: 3px; background: #2a2a4a; border: 1px solid #444;
        }
        .card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
        .card-actions button { font-size: 0.75rem; padding: 4px 10px; margin: 0; }

        .section-list {
            display: none; margin-top: 0.75rem; padding-top: 0.75rem;
            border-top: 1px solid var(--pico-muted-border-color);
        }
        .playbook-card.expanded .section-list { display: block; }
        .section-item { padding: 0.4rem 0; font-size: 0.85rem; }
        .section-item .section-name { font-weight: bold; }
        .section-item .section-desc { opacity: 0.7; font-size: 0.8rem; }

        .empty-state { text-align: center; padding: 2rem; opacity: 0.6; }

        {% include '_chat_css.html' %}
    </style>
</head>
<body>
    <nav class="container">
        <ul><li><strong>Session Intelligence</strong></li></ul>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/playbooks" aria-current="page">Playbooks</a></li>
            <li><a href="/docs">API Docs</a></li>
        </ul>
    </nav>

    <div class="page-layout">
        <!-- Left: Playbook list -->
        <div class="playbook-panel">
            <h3>Playbooks</h3>
            <div id="playbook-list">
                <div class="empty-state">Loading playbooks...</div>
            </div>
        </div>

        <!-- Right: Chat agent -->
        {% include '_chat_panel.html' %}
    </div>

    <script>
    var chatId = '{{ chat_id }}';

    // ── Playbook list ──────────────────────────────────────

    function escHtmlLocal(s) {
        if (!s) return '';
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    async function loadPlaybooks() {
        try {
            var res = await fetch('/api/playbooks');
            var data = await res.json();
            var container = document.getElementById('playbook-list');

            if (data.error) {
                container.innerHTML = '<div class="empty-state">' + escHtmlLocal(data.error) + '</div>';
                return;
            }

            if (!data.playbooks || data.playbooks.length === 0) {
                container.innerHTML = '<div class="empty-state">No playbooks yet. Use the chat to create one.</div>';
                return;
            }

            container.innerHTML = data.playbooks.map(function(pb) {
                var keywords = (pb.keywords || []).map(function(k) {
                    return '<span class="keyword-chip">' + escHtmlLocal(k) + '</span>';
                }).join(' ');

                var sections = (pb.sections || []).map(function(s, i) {
                    return '<div class="section-item">' +
                        '<span class="section-name">' + (i + 1) + '. ' + escHtmlLocal(s.name) + '</span>' +
                        '<div class="section-desc">' + escHtmlLocal(s.description) + '</div>' +
                        '</div>';
                }).join('');

                return '<div class="playbook-card" data-id="' + escHtmlLocal(pb.id) + '" onclick="toggleCard(this)">' +
                    '<div class="card-header">' +
                        '<div>' +
                            '<div class="card-title">' + escHtmlLocal(pb.title) + '</div>' +
                            '<div class="card-desc">' + escHtmlLocal(pb.description) + '</div>' +
                        '</div>' +
                        '<div class="card-actions">' +
                            '<button class="outline secondary" onclick="event.stopPropagation(); deletePlaybook(\'' + escHtmlLocal(pb.id) + '\')">Delete</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="card-meta">' +
                        '<span class="section-badge">' + (pb.sections || []).length + ' sections</span> ' +
                        keywords +
                    '</div>' +
                    '<div class="section-list">' + sections + '</div>' +
                '</div>';
            }).join('');
        } catch (e) {
            document.getElementById('playbook-list').innerHTML =
                '<div class="empty-state">Failed to load playbooks.</div>';
        }
    }

    function toggleCard(card) { card.classList.toggle('expanded'); }

    async function deletePlaybook(id) {
        if (!confirm('Delete this playbook?')) return;
        try {
            await fetch('/api/playbooks/' + id, { method: 'DELETE' });
            loadPlaybooks();
        } catch (e) {
            alert('Failed to delete playbook');
        }
    }

    // Hook: refresh playbooks when agent finishes
    function onAgentDone() { loadPlaybooks(); }

    // Init
    loadPlaybooks();
    </script>
    {% include '_chat_js.html' %}
</body>
</html>
