# .forge/manifest.yaml — claude-session-commons
# Shared session discovery, caching, and classification for Claude Code tools
# Generated by /forge-manifest-init on 2026-03-22

manifest_version: 1

repo:
  visibility: private
  org: eidos-agi
  topics: [claude-code, session-management, python, mcp]

packaging:
  build_system: setuptools  # TODO: migrate to hatchling (TASK-0004)
  pypi:
    name: claude-session-commons
    publish: true
    trusted_publisher:
      owner: eidos-agi
      repo: claude-session-commons
      workflow: publish.yml
      environment: pypi
  readme:
    absolute_images: true

quality:
  required_files:
    - LICENSE
    - README.md
    - CHANGELOG.md
    - SECURITY.md
  min_grade:
    foss_check: C
    ship_check: warn
    sec_audit: clean

security:
  secret_scanning: true
  dependency_audit: true

dependencies:
  max_count: 5

ci:
  workflows:
    ci: true
    publish: true
  permissions:
    contents_read: true
  pre_commit: true
  build_verification: true

exceptions:
  - rule: dependencies.heavy_warning.numpy
    justification: "numpy required for session embedding vectors and classification"
    owner: daniel@eidosagi.com
    expires: 2026-06-22
